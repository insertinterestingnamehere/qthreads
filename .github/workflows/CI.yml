name: CI

on: [push, pull_request]

# Cancel the current workflow if a newer commit gets pushed to the
# branch or PR that triggered it.
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  linux-gcc:
    runs-on: ubuntu-24.04
    continue-on-error: true
    strategy:
      matrix:
        gcc_version: [9, 10, 11, 12, 13, 14]
    env:
      CC: gcc-${{ matrix.gcc_version }}
      CXX: g++-${{ matrix.gcc_version }}
    steps:
    - uses: actions/checkout@v6
    - name: install compiler
      run: |
        sudo apt-get install gcc-${{ matrix.gcc_version }} g++-${{ matrix.gcc_version }}
        sudo apt-get install hwloc libhwloc-dev
        hwloc-ls --version
    - name: build and test
      run: |
        for sch in nemesis sherwood distrib
        do
            for topo in hwloc binders no
            do
                echo "********** Scheduler: $sch, Topology: $topo **********"
                rm -rf build
                mkdir build
                cd build
                cmake -DCMAKE_BUILD_TYPE=Release -DQTHREADS_SCHEDULER="$sch" -DQTHREADS_TOPOLOGY="$topo" ..
                make -j2 VERBOSE=1
                CTEST_OUTPUT_ON_FAILURE=1 timeout -k 10s --foreground 12m make test VERBOSE=1
                cd ..
            done
        done
      timeout-minutes: 30

  # GitHub actions doesn't provide ubuntu 25.04 or 26.04 runners, but we want to test
  # with gcc 15 which is not available on 24.04. We don't need to do the thorough
  # run with 15 though, since we're already doing those extra builds with gcc 16.
  linux-gcc-15:
    runs-on: ubuntu-24.04
    container: ubuntu:26.04
    continue-on-error: true
    env:
      CC: gcc-15
      CXX: g++-15
    steps:
    - uses: actions/checkout@v6
    - name: container prerequisites
      run: |
        # some additional setup steps are only needed when running in a container.
        # These end up being no-ops in the github actions images.
        apt-get update
        apt-get install -y sudo wget software-properties-common cmake
    - run: |
        sudo apt-get install -y gcc-15 g++-15
        sudo apt-get install -y hwloc libhwloc-dev
        hwloc-ls --version
    - name: build and test
      run: |
        for sch in nemesis sherwood distrib
        do
            for topo in hwloc binders no
            do
                echo "********** Scheduler: $sch, Topology: $topo **********"
                rm -rf build
                mkdir build
                cd build
                cmake -DCMAKE_BUILD_TYPE=Release -DQTHREADS_SCHEDULER="$sch" -DQTHREADS_TOPOLOGY="$topo" ..
                make -j2 VERBOSE=1
                CTEST_OUTPUT_ON_FAILURE=1 timeout -k 10s --foreground 12m make test VERBOSE=1
                cd ..
            done
        done
      timeout-minutes: 40

  linux-clang:
    runs-on: ubuntu-24.04
    container: ubuntu:25.04
    continue-on-error: true
    strategy:
      matrix:
        clang_version: [14, 15, 16, 17, 18, 19, 20, 21]
        include:
          - clang_version: 14
            gcc_version: 11
          - clang_version: 15
            gcc_version: 12
          - clang_version: 16
            gcc_version: 13
          - clang_version: 17
            gcc_version: 13
          - clang_version: 18
            gcc_version: 13
          - clang_version: 19
            gcc_version: 14
          - clang_version: 20
            gcc_version: 15
          - clang_version: 21
            gcc_version: 15
    env:
      CC: clang-${{ matrix.clang_version }}
      CXX: clang++-${{ matrix.clang_version }}
    steps:
    - uses: actions/checkout@v6
    - name: container prerequisites
      run: |
        # some additional setup steps are only needed when running in a container.
        # These end up being no-ops in the github actions images.
        apt-get update
        apt-get install -y sudo wget software-properties-common cmake
    - name: install gcc
      run: sudo apt-get install -y gcc-${{ matrix.gcc_version }} g++-${{ matrix.gcc_version }}
    - run: |
        sudo apt-get install -y hwloc libhwloc-dev
        hwloc-ls --version
    - if: ${{ matrix.clang_version == '16' }}
      run: |
        # We can get away with using an older package source for llvm 16.
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        sudo apt-add-repository 'deb https://apt.llvm.org/jammy/ llvm-toolchain-jammy-16 main' && break || sleep 1
    - if: ${{ matrix.clang_version == '21' }}
      run: |
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        sudo apt-add-repository 'deb https://apt.llvm.org/plucky/ llvm-toolchain-plucky-21 main' && break || sleep 1
    - name: install clang
      run: sudo apt-get install -y clang-${{ matrix.clang_version }}
    - name: build and test
      run: |
        # apt gets confused when we bring an older package forward like we do for clang-16.
        # We ultimately end up having to point clang to the right installation location.
        if [ "${{ matrix.clang_version }}" = "16" ]; then export CXXFLAGS="--gcc-install-dir=/lib/gcc/x86_64-linux-gnu/${{ matrix.gcc_version }}"; fi
        for sch in nemesis sherwood distrib
        do
            for topo in hwloc binders no
            do
                echo "********** Scheduler: $sch, Topology: $topo **********"
                rm -rf build
                mkdir build
                cd build
                cmake -DCMAKE_BUILD_TYPE=Release -DQTHREADS_SCHEDULER="$sch" -DQTHREADS_TOPOLOGY="$topo" ..
                make -j2 VERBOSE=1
                CTEST_OUTPUT_ON_FAILURE=1 timeout -k 10s --foreground 12m make test VERBOSE=1
                cd ..
            done
        done
      timeout-minutes: 40

  linux-icx:
    runs-on: ubuntu-24.04
    continue-on-error: true
    env:
      CC: icx
      CXX: icpx
    steps:
    - uses: actions/checkout@v6
    - run: |
        sudo apt-get install hwloc libhwloc-dev
        hwloc-ls --version
    - name: install gcc
      run: |
        sudo apt-get install gcc-14 g++-14
    - name: install icx
      run: |
        wget -O - https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB | sudo apt-key add - && break || sleep 1
        sudo apt-add-repository 'deb https://apt.repos.intel.com/oneapi all main' && break || sleep 1
        sudo apt-get install intel-oneapi-compiler-dpcpp-cpp-2025.3
        source /opt/intel/oneapi/setvars.sh
        icx -v
    - name: build and test
      run: |
        source /opt/intel/oneapi/setvars.sh
        for sch in nemesis sherwood distrib
        do
            for topo in hwloc binders no
            do
                echo "********** Scheduler: $sch, Topology: $topo **********"
                rm -rf build
                mkdir build
                cd build
                cmake -DCMAKE_BUILD_TYPE=Release -DQTHREADS_SCHEDULER="$sch" -DQTHREADS_TOPOLOGY="$topo" ..
                make -j2 VERBOSE=1
                CTEST_OUTPUT_ON_FAILURE=1 timeout -k 10s --foreground 12m make test VERBOSE=1
                cd ..
            done
        done
      timeout-minutes: 40

  linux-icc:
    runs-on: ubuntu-22.04
    continue-on-error: true
    env:
      CC: icc
      CXX: icpc
      CFLAGS: "-diag-disable=10441"
      CXXFLAGS: "-diag-disable=10441"
    steps:
    - uses: actions/checkout@v6
    - run: |
        sudo apt-get install hwloc libhwloc-dev
        hwloc-ls --version
    - name: install gcc
      run: |
        sudo apt-get install gcc-12 g++-12 # last compatible gcc version for icpc
    - name: install icc
      run: |
        wget -O - https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB | sudo apt-key add - && break || sleep 1
        sudo apt-add-repository 'deb https://apt.repos.intel.com/oneapi all main' && break || sleep 1
        sudo apt-get install intel-oneapi-compiler-dpcpp-cpp-and-cpp-classic-2023.2.4
        source /opt/intel/oneapi/setvars.sh
        icc -v
    - name: build and test
      run: |
        source /opt/intel/oneapi/setvars.sh
        for sch in nemesis sherwood distrib
        do
            for topo in hwloc binders no
            do
                echo "********** Scheduler: $sch, Topology: $topo **********"
                rm -rf build
                mkdir build
                cd build
                cmake -DCMAKE_BUILD_TYPE=Release -DQTHREADS_SCHEDULER="$sch" -DQTHREADS_TOPOLOGY="$topo" ..
                make -j2 VERBOSE=1
                CTEST_OUTPUT_ON_FAILURE=1 timeout -k 10s --foreground 12m make test VERBOSE=1
                cd ..
            done
        done
      timeout-minutes: 40

  linux-aocc:
    runs-on: ubuntu-24.04
    continue-on-error: true
    env:
      CC: clang
      CXX: clang++
    steps:
    - uses: actions/checkout@v6
    - run: |
        sudo apt-get install hwloc libhwloc-dev
        hwloc-ls --version
    - name: install gcc
      run: |
        sudo apt-get install gcc-14 g++-14
    - name: install aocc
      run: |
        wget -nv -O aocc.deb https://download.amd.com/developer/eula/aocc/aocc-5-1/aocc-compiler-5.1.0_1_amd64.deb
        sudo apt install -y ./aocc.deb
        source /opt/AMD/aocc-compiler-5.1.0/setenv_AOCC.sh
        clang -v
    - name: build and test
      run: |
        source /opt/AMD/aocc-compiler-5.1.0/setenv_AOCC.sh
        for sch in nemesis sherwood distrib
        do
            for topo in hwloc binders no
            do
                echo "********** Scheduler: $sch, Topology: $topo **********"
                rm -rf build
                mkdir build
                cd build
                cmake -DCMAKE_BUILD_TYPE=Release -DQTHREADS_SCHEDULER="$sch" -DQTHREADS_TOPOLOGY="$topo" ..
                make -j2 VERBOSE=1
                CTEST_OUTPUT_ON_FAILURE=1 timeout -k 10s --foreground 12m make test VERBOSE=1
                cd ..
            done
        done
      timeout-minutes: 40

  arm_acfl:
    runs-on: ubuntu-22.04-arm
    continue-on-error: true
    env:
      CC: armclang
      CXX: armclang++
    steps:
    - uses: actions/checkout@v6
    - name: install deps
      run: |
        # Set up apt to get a more recent CMake directly from Kitware.
        # This way it recognizes armclang.
        wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | gpg --dearmor - | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
        echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ jammy main' | sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null
        sudo apt-get update -y
        sudo apt-get install -y cmake
        sudo apt-get install -y hwloc libhwloc-dev
        wget -O acfl.tar https://developer.arm.com/-/cdn-downloads/permalink/Arm-Compiler-for-Linux/Version_24.10.1/arm-compiler-for-linux_24.10.1_Ubuntu-22.04_aarch64.tar
        tar -vxf acfl.tar
        ./arm-compiler-for-linux_24.10.1_Ubuntu-22.04/arm-compiler-for-linux_24.10.1_Ubuntu-22.04.sh -a -f -s acfl
        rm acfl.tar
        sudo apt install -y ./acfl/gcc-14.2.0_Ubuntu-22.04.deb ./acfl/arm-linux-compiler-24.10.1_Ubuntu-22.04.deb
        rm -rf acfl
        export PATH=$PATH:/opt/arm/arm-linux-compiler-24.10.1_Ubuntu-22.04/bin
        armclang -v
    - name: build and test
      run: |
        export PATH=$PATH:/opt/arm/arm-linux-compiler-24.10.1_Ubuntu-22.04/bin
        for sch in nemesis sherwood distrib
        do
            for topo in hwloc binders no
            do
                echo "********** Scheduler: $sch, Topology: $topo **********"
                rm -rf build
                mkdir build
                cd build
                cmake -DCMAKE_BUILD_TYPE=Release -DQTHREADS_SCHEDULER="$sch" -DQTHREADS_TOPOLOGY="$topo" ..
                make -j2 VERBOSE=1
                CTEST_OUTPUT_ON_FAILURE=1 timeout -k 10s --foreground 4m make test VERBOSE=1
                cd ..
            done
        done
      timeout-minutes: 50

  nvc:
    strategy:
      matrix:
        image: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.image }}
    continue-on-error: true
    env:
      CC: nvc
      CXX: nvc++
    steps:
    - uses: actions/checkout@v6
    - name: install deps
      run: |
        curl https://developer.download.nvidia.com/hpc-sdk/ubuntu/DEB-GPG-KEY-NVIDIA-HPC-SDK | sudo gpg --dearmor -o /usr/share/keyrings/nvidia-hpcsdk-archive-keyring.gpg
        export MACHINE_TYPE=`uname -m`
        if [ ${MACHINE_TYPE} == 'x86_64' ]; then echo 'deb [signed-by=/usr/share/keyrings/nvidia-hpcsdk-archive-keyring.gpg] https://developer.download.nvidia.com/hpc-sdk/ubuntu/amd64 /' | sudo tee /etc/apt/sources.list.d/nvhpc.list; fi
        if [ ${MACHINE_TYPE} == 'aarch64' ]; then echo 'deb [signed-by=/usr/share/keyrings/nvidia-hpcsdk-archive-keyring.gpg] https://developer.download.nvidia.com/hpc-sdk/ubuntu/arm64 /' | sudo tee /etc/apt/sources.list.d/nvhpc.list; fi
        sudo apt-get update -y
        sudo apt-get install -y cmake gcc g++ gfortran hwloc libhwloc-dev
        sudo apt-get install -y nvhpc-26-1
    - name: build and test
      run: |
        export MACHINE_TYPE=`uname -m`
        if [ ${MACHINE_TYPE} == 'x86_64' ]; then export PATH="$PATH:/opt/nvidia/hpc_sdk/Linux_x86_64/26.1/compilers/bin"; fi
        if [ ${MACHINE_TYPE} == 'aarch64' ]; then export PATH="$PATH:/opt/nvidia/hpc_sdk/Linux_aarch64/26.1/compilers/bin"; fi
        nvc --version
        for sch in nemesis sherwood distrib
        do
            for topo in hwloc binders no
            do
                echo "********** Scheduler: $sch, Topology: $topo **********"
                rm -rf build
                mkdir build
                cd build
                cmake -DCMAKE_BUILD_TYPE=Release -DQTHREADS_SCHEDULER="$sch" -DQTHREADS_TOPOLOGY="$topo" ..
                make -j2 VERBOSE=1
                CTEST_OUTPUT_ON_FAILURE=1 timeout -k 10s --foreground 4m make test VERBOSE=1
                cd ..
            done
        done
      timeout-minutes: 40

  mac:
    continue-on-error: true
    strategy:
      matrix:
        image: [macos-15, macos-15-intel] # Test on both ARM and X86 (through fall 2027)
    runs-on: ${{ matrix.image }}
    steps:
    - uses: actions/checkout@v6
    - name: install deps
      run: |
        brew install coreutils # coreutils is to get gtimeout for CI and is not universally required by qthreads.
        brew install gcc
    - run: |
        brew install hwloc
        hwloc-ls --version
    - name: build and test
      run: |
        export CFLAGS="-I$(brew --prefix)/include $CFLAGS"
        export CXXFLAGS="-I$(brew --prefix)/include $CXXFLAGS"
        export LDFLAGS="-L$(brew --prefix)/lib $LDFLAGS"
        for compiler in gcc clang
        do
            if [ "$compiler" = "gcc" ]; then export CC=gcc && export CXX=g++; fi
            if [ "$compiler" = "clang" ]; then export CC=clang && export CXX=clang++; fi
            for build_type in Release Debug
            do
                for sch in nemesis sherwood distrib
                do
                    for topo in hwloc binders no
                    do
                        echo "********** Compiler: $compiler, Build type: $build_type, Scheduler: $sch, Topology: $topo **********"
                        rm -rf build
                        mkdir build
                        cd build
                        cmake -DCMAKE_BUILD_TYPE="$build_type" -DQTHREADS_SCHEDULER="$sch" -DQTHREADS_TOPOLOGY="$topo" ..
                        make -j4 VERBOSE=1
                        CTEST_OUTPUT_ON_FAILURE=1 timeout -k 10s --foreground 12m make test VERBOSE=1
                        cd ..
                    done
                done
            done
        done
        # commented example for how to get a backtrace from CI usign lldb on OSX:
        #echo "settings set target.process.stop-on-exec false" > ~/.lldbinit
        #QT_NUM_SHEPHERDS=2 QT_NUM_WORKERS_PER_SHEPHERD=1 lldb bash --batch --one-line 'process launch' --one-line-on-crash 'bt' --one-line-on-crash 'quit' -- test/basics/hello_world
      timeout-minutes: 60

  sanitizers:
    strategy:
      matrix:
        image: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.image }}
    container: ubuntu:26.04
    continue-on-error: true
    env:
      CC: clang-22
      CXX: clang++-22
      QTHREAD_STACK_SIZE: 2097152
      ASAN_OPTIONS: "check_initialization_order=1"
    steps:
    - uses: actions/checkout@v6
    - name: container prerequisites
      run: |
        # some additional setup steps are only needed when running in a container.
        # These end up being no-ops in the github actions images.
        apt-get update
        apt-get install -y sudo wget software-properties-common cmake
    - run: |
        sudo apt-get install -y gcc-16 g++-16
    - run: |
        sudo apt-get install -y hwloc libhwloc-dev
        hwloc-ls --version
    - name: install compiler
      run: |
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        # No current LLVM apt repo for 26.04 (resolute racoon) yet, so just pull in the previous version
        sudo apt-add-repository 'deb https://apt.llvm.org/questing/ llvm-toolchain-questing-22 main' && break || sleep 1
        sudo apt-get install -y clang-22
    - name: build and test
      run: |
        # thread sanitizer:
        echo "********** Sanitizer: thread **********"
        # only test thread sanitizer in the nemesis/no topology config.
        export CFLAGS="-fsanitize=thread -fno-sanitize-recover=all"
        export CXXFLAGS="-fsanitize=thread -fno-sanitize-recover=all"
        export LDFLAGS="-fsanitize=thread -fno-sanitize-recover=all"
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release -DQTHREADS_SCHEDULER=nemesis -DQTHREAEDS_TOPOLOGY=no ..
        make -j2 VERBOSE=1
        # basic tests only
        cd test/basics
        CTEST_OUTPUT_ON_FAILURE=1 timeout -k 10s --foreground 18m make test VERBOSE=1
        cd ../../..
        # memory sanitizer:
        # memory sanitizer doesn't like hwloc, so don't test that config.
        export CFLAGS="-fsanitize=memory -fno-sanitize-recover=all"
        export CXXFLAGS="-fsanitize=memory -fno-sanitize-recover=all"
        export LDFLAGS="-fsanitize=memory -fno-sanitize-recover=all"
        for sch in nemesis sherwood distrib
        do
            echo "********** Sanitizer: memory, Scheduler: $sch **********"
            rm -rf build
            mkdir build
            cd build
            cmake -DCMAKE_BUILD_TYPE=Release -DQTHREADS_SCHEDULER="$sch" -DQTHREADS_TOPOLOGY=no ..
            make -j2 VERBOSE=1
            CTEST_OUTPUT_ON_FAILURE=1 timeout -k 10s --foreground 18m make test VERBOSE=1
            cd ..
        done
        for san in address undefined
        do
            export CFLAGS="-fsanitize=$san -fno-sanitize-recover=all"
            export CXXFLAGS="-fsanitize=$san -fno-sanitize-recover=all"
            export LDFLAGS="-fsanitize=$san -fno-sanitize-recover=all"
            for sch in nemesis sherwood distrib
            do
                for topo in hwloc binders no
                do
                    echo "********** Sanitizer: $san, Scheduler: $sch, Topology: $topo **********"
                    rm -rf build
                    mkdir build
                    cd build
                    cmake -DCMAKE_BUILD_TYPE=Release -DQTHREADS_SCHEDULER="$sch" -DQTHREADS_TOPOLOGY="$topo" ..
                    make -j2 VERBOSE=1
                    CTEST_OUTPUT_ON_FAILURE=1 timeout -k 10s --foreground 18m make test VERBOSE=1
                    cd ..
                done
            done
        done
      timeout-minutes: 60

  linux-thorough:
    strategy:
      matrix:
        image: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.image }}
    container: ubuntu:26.04
    continue-on-error: true
    steps:
    - uses: actions/checkout@v6
    - name: container prerequisites
      run: |
        # some additional setup steps are only needed when running in a container.
        # These end up being no-ops in the github actions images.
        apt-get update
        apt-get install -y sudo wget software-properties-common cmake
    - run: |
        sudo apt-get install -y gcc-16 g++-16
    - run: |
        sudo apt-get install -y hwloc libhwloc-dev
        hwloc-ls --version
    - run: |
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        # No current LLVM apt repo for 26.04 (resolute racoon) yet, so just pull in the previous version
        sudo apt-add-repository 'deb https://apt.llvm.org/questing/ llvm-toolchain-questing-22 main' && break || sleep 1
        sudo apt-get install -y clang-22
    - name: build and run
      run: |
        for compiler in gcc clang
        do
            if [ "$compiler" = "gcc" ]; then export CC=gcc-16 && export CXX=g++-16; fi
            if [ "$compiler" = "clang" ]; then export CC=clang-22 && export CXX=clang++-22; fi
            for build_type in Release Debug
            do
                for sch in nemesis sherwood distrib
                do
                    for topo in hwloc binders no
                    do
                        echo "********** Compiler: $compiler, Build type: $build_type, Scheduler: $sch, Topology: $topo **********"
                        rm -rf build
                        mkdir build
                        cd build
                        cmake -DCMAKE_BUILD_TYPE="$build_type" -DQTHREADS_SCHEDULER="$sch" -DQTHREADS_TOPOLOGY="$topo" ..
                        make -j2 VERBOSE=1
                        CTEST_OUTPUT_ON_FAILURE=1 timeout -k 10s --foreground 18m make test VERBOSE=1
                        cd ..
                    done
                done
            done
        done
      timeout-minutes: 60

  clang-format:
    runs-on: ubuntu-24.04
    continue-on-error: true
    env:
      CC: 'clang-22'
      CXX: 'clang++-22'
    steps:
    - uses: actions/checkout@v6
    - run: |
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        sudo apt-add-repository 'deb https://apt.llvm.org/noble/ llvm-toolchain-noble-22 main' && break || sleep 1
        sudo apt-get install clang-format-22
    - name: check formatting
      run: |
        sh clang-format.sh
        git --no-pager diff
        if [[ $(git --no-pager diff) ]]; then echo "need to rerun clang-format"; exit 1; fi
